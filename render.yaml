# Render blueprint for the Trackify backend (free tier).
# Deploy: push this repo to GitHub → render.com → New + → Blueprint → pick the repo.
# Then set GROK_API_KEY (or your provider's key) in the service's Environment tab.
services:
  - type: web
    name: trackify-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: AI_PROVIDER
        value: grok
      - key: GROK_API_KEY
        sync: false
      - key: GROK_MODEL
        value: grok-3
